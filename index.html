<style>

<body>

<div class="header">
  <h1 id="t-title">上座・下座 チェッカー</h1>
  <button class="btn" id="langBtn" onclick="toggleLang()" style="margin-top:6px;font-size:0.78rem;padding:4px 12px;">EN</button>
</div>

<div class="app">
  <div class="left">
    <div class="toolbar">
      <button class="btn" onclick="undo()" id="t-undo">↩ 戻る</button>
<button class="btn btn-danger" onclick="resetAll()" id="t-reset">全リセット</button>
    </div>
    <div class="hint-box" id="hint"></div>
    <canvas id="c" width="640" height="460"></canvas>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-share" style="flex:1" onclick="shareToX()" id="t-share">𝕏 シェア</button>
      <button class="btn btn-save" style="flex:1" onclick="saveImage()" id="t-save">💾 画像保存</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="card">
      <ul id="rankList"></ul>
    </div>
  </div>
</div>


<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Layout constants ──────────────────────────────────────────
const RM = { x: 55, y: 55, w: 530, h: 350 };
const WW = 12;   // wall width
const DW = 52;   // door opening width
const SR = 20;   // seat radius

// ── State ─────────────────────────────────────────────────────
let door = null;
let seats = [];
let lang = 'ja';

// ── i18n ──────────────────────────────────────────────────────
const T = {
  ja: {
    title:          '上座・下座 チェッカー',
    subtitle:       '出入り口と座席を配置して上座・下座を確認',
    door:           '出入り口を配置',
    seat:           '座席を追加',
    clear:          '座席クリア',
    reset:          '全リセット',
    share:          '𝕏 シェア',
    save:           '💾 画像保存',
    legend:         '凡例',
    kamizaLegend:   '<b style="color:#f87171">上座</b>（最も格上の席）',
    middleLegend:   '中間席',
    shimozaLegend:  '<b style="color:#60a5fa">下座</b>（最も格下の席）',
    entranceLegend: '出入り口',
    ranking:        '座席ランキング',
    rules:          'マナーのルール',
    ruleText:       '出入り口から<b style="color:#f87171">最も遠い席</b>が<b>上座</b>。目上の方や主賓が座ります。<br><br>出入り口に<b style="color:#60a5fa">最も近い席</b>が<b>下座</b>。幹事・接待側が座ります。',
    undo:           '↩ 戻る',
    hintInit:       '壁をクリック → 出入り口を設置　／　部屋の中をクリック → 座席を追加',
    hintHasDoor:    '部屋の中をクリックして座席を追加しましょう。ドラッグで移動、ダブルクリックで削除できます',
    hintHasBoth:    'ドラッグで自由に移動、ダブルクリックで削除できます',
    hintWarn:       '⚠️ 出入り口がまだありません。壁をクリックして設置してください',
    rankEmpty:      '出入り口と座席を配置して上座・下座を確認',
    rankNoDoor:     '出入り口を配置すると格順が決まります',
    rankSeat:       '番の席',
    kamiza:         '上座',
    shimoza:        '下座',
    shareText:      (n) => n > 0 ? `上座・下座チェッカーで${n}席の配置を確認しました！` : '上座・下座チェッカー｜座席を配置するだけで上座・下座を自動判定！',
    welcomeLine1:   '① 壁をクリック → 出入り口を配置',
    welcomeLine2:   '② 部屋の中をクリック → 座席を追加',
    entranceLabel:  '出入口',
  },
  en: {
    title:          'Kamiza / Shimoza Checker',
    subtitle:       'Place the door and seats to check seat hierarchy',
    door:           'Place Door',
    seat:           'Add Seat',
    clear:          'Clear Seats',
    reset:          'Reset All',
    share:          '𝕏 Share',
    save:           '💾 Save Image',
    legend:         'Legend',
    kamizaLegend:   '<b style="color:#f87171">Kamiza</b> (Seat of Honor)',
    middleLegend:   'Middle Seat',
    shimozaLegend:  '<b style="color:#60a5fa">Shimoza</b> (Lowest Seat)',
    entranceLegend: 'Entrance',
    ranking:        'Seat Ranking',
    rules:          'Etiquette Rules',
    ruleText:       'The seat <b style="color:#f87171">farthest from the entrance</b> is <b>Kamiza</b> — for the most senior guest.<br><br>The seat <b style="color:#60a5fa">closest to the entrance</b> is <b>Shimoza</b> — for the host or organizer.',
    hintInit:       'Click a wall → Place entrance　／　Click inside → Add seat',
    hintHasDoor:    'Click inside the room to add seats. Drag to move, double-click to delete',
    hintHasBoth:    'Drag to move, double-click to delete',
    hintWarn:       '⚠️ No entrance yet. Click on a wall to place it',
    rankEmpty:      'Place the door and seats to check seat hierarchy',
    rankNoDoor:     'Place the entrance to determine seat order',
    rankSeat:       '',
    kamiza:         'Kamiza',
    shimoza:        'Shimoza',
    shareText:      (n) => n > 0 ? `I checked ${n} seats with the Kamiza/Shimoza Checker!` : 'Kamiza/Shimoza Checker — Check Japanese seating etiquette instantly!',
    welcomeLine1:   '① Click a wall → Place entrance',
    undo:           '↩ Undo',
    welcomeLine2:   '② Click inside the room → Add seat',
    entranceLabel:  'Entrance',
  }
};

function t(key, ...args) {
  const val = T[lang][key];
  return typeof val === 'function' ? val(...args) : val;
}

function toggleLang() {
  lang = lang === 'ja' ? 'en' : 'ja';
  document.getElementById('langBtn').textContent = lang === 'ja' ? 'EN' : 'JA';
  document.getElementById('t-title').textContent        = t('title');
  document.getElementById('t-undo').textContent         = t('undo');
  document.getElementById('t-reset').textContent        = t('reset');
  document.getElementById('t-share').textContent        = t('share');
  document.getElementById('t-save').textContent         = t('save');
  updateHint();
  updateRankList();
  redraw();
}

// ── History ───────────────────────────────────────────────────
const history = [];
function saveHistory() {
  history.push({ door: door ? { ...door } : null, seats: seats.map(s => ({ ...s })) });
  if (history.length > 50) history.shift();
}
function undo() {
  if (!history.length) return;
  const s = history.pop();
  door = s.door; seats = s.seats;
  redraw(); updateRankList(); updateHint();
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
});

// ── Utilities ─────────────────────────────────────────────────
function seatColor(rank, total) {
  if (total <= 1) return 'hsl(0,72%,45%)';
  const t = (rank - 1) / (total - 1); // 0 = kamiza (red), 1 = shimoza (blue)
  const h = Math.round(t * 240);      // 0=red → 240=blue
  const s = 72;
  const l = 40 + t * 10;
  return `hsl(${h},${s}%,${l}%)`;
}

function doorCenter() {
  if (!door) return null;
  const { wall, frac } = door;
  if (wall === 'top')    return { x: RM.x + frac * RM.w, y: RM.y };
  if (wall === 'bottom') return { x: RM.x + frac * RM.w, y: RM.y + RM.h };
  if (wall === 'left')   return { x: RM.x,               y: RM.y + frac * RM.h };
  /* right */            return { x: RM.x + RM.w,         y: RM.y + frac * RM.h };
}

function rankedSeats() {
  if (seats.length === 0) return [];
  const dc = doorCenter();
  if (!dc) return seats.map((s, i) => ({ ...s, rank: i + 1, total: seats.length }));
  const arr = seats.map(s => ({ ...s, dist: Math.hypot(s.x - dc.x, s.y - dc.y) }));
  arr.sort((a, b) => b.dist - a.dist);  // furthest = rank 1 = kamiza
  return arr.map((s, i) => ({ ...s, rank: i + 1, total: arr.length }));
}

// ── Actions ───────────────────────────────────────────────────
function clearSeats() { saveHistory(); seats = []; redraw(); updateRankList(); updateHint(); }

function resetAll() {
  saveHistory();
  door = null; seats = [];
  redraw(); updateRankList(); updateHint();
}

function updateHint() {
  const el = document.getElementById('hint');
  if (seats.length > 0 && !door) {
    el.textContent = t('hintWarn');
    el.classList.add('warn');
    return;
  }
  el.classList.remove('warn');
  if (!door && seats.length === 0) el.textContent = t('hintInit');
  else if (door && seats.length === 0) el.textContent = t('hintHasDoor');
  else el.textContent = t('hintHasBoth');
}

// ── Input ─────────────────────────────────────────────────────
let dragging = null; // { type: 'seat', idx } | { type: 'door' }
let dragMoved = false;
let lastTap = { time: 0, x: 0, y: 0 };

function getCanvasPos(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width;
  const sy = canvas.height / r.height;
  const src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  return {
    x: (src.clientX - r.left) * sx,
    y: (src.clientY - r.top) * sy,
  };
}

function hitTestDoor(x, y) {
  if (!door) return false;
  const dc = doorCenter();
  return Math.hypot(x - dc.x, y - dc.y) < DW;
}

function startDrag(e) {
  const { x, y } = getCanvasPos(e);
  dragMoved = false;

  const idx = seats.findIndex(s => Math.hypot(s.x - x, s.y - y) < SR + 6);
  if (idx >= 0) { dragging = { type: 'seat', idx }; e.preventDefault(); return; }

  if (hitTestDoor(x, y)) { dragging = { type: 'door' }; e.preventDefault(); return; }
}

function moveDrag(e) {
  const { x, y } = getCanvasPos(e);

  if (dragging) {
    if (!dragMoved) saveHistory(); // ドラッグ開始時に1回だけ保存
    dragMoved = true;
    e.preventDefault();
    if (dragging.type === 'seat') {
      const pad = WW + SR + 3;
      seats[dragging.idx].x = Math.max(RM.x + pad, Math.min(RM.x + RM.w - pad, x));
      seats[dragging.idx].y = Math.max(RM.y + pad, Math.min(RM.y + RM.h - pad, y));
    } else if (dragging.type === 'door') {
      snapDoorToWall(x, y);
    }
    redraw(); updateRankList();
    return;
  }

  // カーソル更新
  const seatHit = seats.some(s => Math.hypot(s.x - x, s.y - y) < SR + 6);
  if (seatHit || hitTestDoor(x, y)) {
    canvas.style.cursor = 'grab';
  } else if (nearWall(x, y)) {
    canvas.style.cursor = 'pointer';
  } else {
    const inRoom = x > RM.x + WW && x < RM.x + RM.w - WW &&
                   y > RM.y + WW && y < RM.y + RM.h - WW;
    canvas.style.cursor = inRoom ? 'crosshair' : 'default';
  }
}

function endDrag(e) {
  const { x, y } = getCanvasPos(e);

  // 二重タップ検出（draggingチェックより先）
  if (e.changedTouches && !dragMoved) {
    const now = Date.now();
    if (now - lastTap.time < 350 && Math.hypot(x - lastTap.x, y - lastTap.y) < 30) {
      dragging = null;
      saveHistory();
      onDblClick(e);
      lastTap.time = 0;
      return;
    }
    lastTap = { time: now, x, y };
  }

  if (dragging) {
    dragging = null;
    canvas.style.cursor = 'default';
    return;
  }
  if (dragMoved) return;

  saveHistory();
  if (nearWall(x, y)) tryPlaceDoor(x, y);
  else tryPlaceNewSeat(x, y);
  redraw(); updateRankList(); updateHint();
}

function onDblClick(e) {
  const { x, y } = getCanvasPos(e);
  const idx = seats.findIndex(s => Math.hypot(s.x - x, s.y - y) < SR + 6);
  if (idx >= 0) { seats.splice(idx, 1); redraw(); updateRankList(); return; }
  if (hitTestDoor(x, y)) { door = null; redraw(); updateRankList(); updateHint(); }
}

function snapDoorToWall(x, y) {
  const HIT = 60;
  const candidates = [
    { wall: 'top',    dist: Math.abs(y - RM.y),          along: x, min: RM.x, max: RM.x + RM.w, len: RM.w },
    { wall: 'bottom', dist: Math.abs(y - (RM.y + RM.h)), along: x, min: RM.x, max: RM.x + RM.w, len: RM.w },
    { wall: 'left',   dist: Math.abs(x - RM.x),          along: y, min: RM.y, max: RM.y + RM.h, len: RM.h },
    { wall: 'right',  dist: Math.abs(x - (RM.x + RM.w)), along: y, min: RM.y, max: RM.y + RM.h, len: RM.h },
  ];
  candidates.sort((a, b) => a.dist - b.dist);
  const c = candidates[0];
  if (c.dist < HIT) {
    const hf = (DW / 2) / c.len;
    const frac = Math.max(hf, Math.min(1 - hf, (c.along - c.min) / c.len));
    door = { wall: c.wall, frac };
  }
}

canvas.addEventListener('mousedown',  startDrag);
canvas.addEventListener('mousemove',  moveDrag);
canvas.addEventListener('mouseup',    endDrag);
canvas.addEventListener('dblclick',   onDblClick);
canvas.addEventListener('touchstart', startDrag, { passive: false });
canvas.addEventListener('touchmove',  moveDrag,  { passive: false });
canvas.addEventListener('touchend',   endDrag);

function nearWall(x, y) {
  const HIT = 26;
  return (Math.abs(y - RM.y) < HIT          && x >= RM.x - HIT && x <= RM.x + RM.w + HIT) ||
         (Math.abs(y - (RM.y + RM.h)) < HIT && x >= RM.x - HIT && x <= RM.x + RM.w + HIT) ||
         (Math.abs(x - RM.x) < HIT          && y >= RM.y - HIT && y <= RM.y + RM.h + HIT) ||
         (Math.abs(x - (RM.x + RM.w)) < HIT && y >= RM.y - HIT && y <= RM.y + RM.h + HIT);
}

function tryPlaceDoor(x, y) {
  const HIT = 26;
  const candidates = [
    { wall: 'top',    dist: Math.abs(y - RM.y),          along: x, min: RM.x, max: RM.x + RM.w, len: RM.w },
    { wall: 'bottom', dist: Math.abs(y - (RM.y + RM.h)), along: x, min: RM.x, max: RM.x + RM.w, len: RM.w },
    { wall: 'left',   dist: Math.abs(x - RM.x),          along: y, min: RM.y, max: RM.y + RM.h, len: RM.h },
    { wall: 'right',  dist: Math.abs(x - (RM.x + RM.w)), along: y, min: RM.y, max: RM.y + RM.h, len: RM.h },
  ].filter(c => c.dist < HIT && c.along >= c.min && c.along <= c.max);

  if (candidates.length === 0) return;
  candidates.sort((a, b) => a.dist - b.dist);
  const c = candidates[0];
  const hf = (DW / 2) / c.len;
  const frac = Math.max(hf, Math.min(1 - hf, (c.along - c.min) / c.len));
  door = { wall: c.wall, frac };
}

function tryPlaceNewSeat(x, y) {
  if (seats.some(s => Math.hypot(s.x - x, s.y - y) < SR + 6)) return;
  const pad = WW + SR + 3;
  if (x > RM.x + pad && x < RM.x + RM.w - pad &&
      y > RM.y + pad && y < RM.y + RM.h - pad) {
    seats.push({ x, y });
  }
}

// ── Drawing ───────────────────────────────────────────────────
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBg();
  drawFloor();
  drawGrid();
  drawWalls();
  if (door) drawDoor();
  drawSeats();
  if (!door && seats.length === 0) drawWelcome();
}

function drawBg() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawFloor() {
  ctx.fillStyle = '#161b22';
  ctx.fillRect(RM.x, RM.y, RM.w, RM.h);
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const step = 44;
  for (let x = RM.x + step; x < RM.x + RM.w; x += step) {
    ctx.beginPath(); ctx.moveTo(x, RM.y); ctx.lineTo(x, RM.y + RM.h); ctx.stroke();
  }
  for (let y = RM.y + step; y < RM.y + RM.h; y += step) {
    ctx.beginPath(); ctx.moveTo(RM.x, y); ctx.lineTo(RM.x + RM.w, y); ctx.stroke();
  }
}

function wallSegs() {
  const segs = [];
  function add(wallName, x1, y1, x2, y2) {
    if (!door || door.wall !== wallName) { segs.push([x1, y1, x2, y2]); return; }
    const hw = DW / 2;
    const { frac } = door;
    if (wallName === 'top' || wallName === 'bottom') {
      const cx = RM.x + frac * RM.w;
      segs.push([RM.x, y1, cx - hw, y1]);
      segs.push([cx + hw, y1, RM.x + RM.w, y1]);
    } else {
      const cy = RM.y + frac * RM.h;
      segs.push([x1, RM.y, x1, cy - hw]);
      segs.push([x1, cy + hw, x1, RM.y + RM.h]);
    }
  }
  add('top',    RM.x,        RM.y,        RM.x + RM.w, RM.y);
  add('right',  RM.x + RM.w, RM.y,        RM.x + RM.w, RM.y + RM.h);
  add('bottom', RM.x,        RM.y + RM.h, RM.x + RM.w, RM.y + RM.h);
  add('left',   RM.x,        RM.y,        RM.x,        RM.y + RM.h);
  return segs;
}

function drawWalls() {
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = WW;
  ctx.lineCap = 'square';
  for (const [x1, y1, x2, y2] of wallSegs()) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
}

function drawDoor() {
  const dc = doorCenter();
  const hw = DW / 2;
  const { wall } = door;

  // Cyan gap fill
  ctx.fillStyle = '#10b981';
  if (wall === 'top' || wall === 'bottom') {
    ctx.fillRect(dc.x - hw, dc.y - WW / 2, DW, WW);
  } else {
    ctx.fillRect(dc.x - WW / 2, dc.y - hw, WW, DW);
  }

  // Arrow direction into room
  let dx = 0, dy = 0;
  if (wall === 'top')    { dy =  1; }
  if (wall === 'bottom') { dy = -1; }
  if (wall === 'left')   { dx =  1; }
  if (wall === 'right')  { dx = -1; }

  const startX = dc.x + dx * (WW / 2 + 4);
  const startY = dc.y + dy * (WW / 2 + 4);
  const arrowLen = 38;
  const ex = startX + dx * arrowLen;
  const ey = startY + dy * arrowLen;

  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(ex, ey);
  ctx.stroke();

  // Arrowhead
  const ang = Math.atan2(ey - startY, ex - startX);
  const aLen = 9;
  ctx.fillStyle = '#10b981';
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - aLen * Math.cos(ang - 0.42), ey - aLen * Math.sin(ang - 0.42));
  ctx.lineTo(ex - aLen * Math.cos(ang + 0.42), ey - aLen * Math.sin(ang + 0.42));
  ctx.closePath();
  ctx.fill();

  // "出入口" label (outside the room)
  const labelGap = 18;
  let lx = dc.x + (-dx) * labelGap;
  let ly = dc.y + (-dy) * labelGap;

  ctx.save();
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText('出入口').width + 10;
  ctx.fillStyle = '#10b981';
  rrect(ctx, lx - tw / 2, ly - 9, tw, 18, 4);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.fillText(t('entranceLabel'), lx, ly);
  ctx.restore();
}

function drawSeats() {
  const ranked = rankedSeats();

  for (const s of ranked) {
    const color = door ? seatColor(s.rank, s.total) : '#999';

    // Outer ring for top/bottom
    if (door && s.total >= 1 && (s.rank === 1 || s.rank === s.total)) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, SR + 5, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.22)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 3;

    // Seat circle
    ctx.beginPath();
    ctx.arc(s.x, s.y, SR, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Rank number
    ctx.fillStyle = 'white';
    ctx.font = `bold ${s.total > 9 ? 12 : 14}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(s.rank), s.x, s.y);

    // 上座 / 下座 badge
    if (door) {
      if (s.rank === 1) {
        seatLabel(s.x, s.y - SR - 8, t('kamiza'), color);
      } else if (s.rank === s.total && s.total >= 2) {
        seatLabel(s.x, s.y - SR - 8, t('shimoza'), color);
      }
    }
  }
}

function seatLabel(cx, bottom, text, color) {
  ctx.save();
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  const tw = ctx.measureText(text).width + 8;
  const h = 16;
  ctx.fillStyle = color;
  rrect(ctx, cx - tw / 2, bottom - h, tw, h, 3);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.fillText(text, cx, bottom - 3);
  ctx.restore();
}

function drawWelcome() {
  ctx.fillStyle = 'rgba(139,148,158,0.5)';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t('welcomeLine1'), RM.x + RM.w / 2, RM.y + RM.h / 2 - 14);
  ctx.fillText(t('welcomeLine2'), RM.x + RM.w / 2, RM.y + RM.h / 2 + 14);
}

// Rounded rectangle path helper
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Sidebar rank list ─────────────────────────────────────────
function updateRankList() {
  const list = document.getElementById('rankList');
  const ranked = rankedSeats();

  if (ranked.length === 0) {
    list.innerHTML = `<li style="color:#aaa;font-size:0.81rem;padding:4px">${t('rankEmpty')}</li>`;
    return;
  }
  if (!door) {
    list.innerHTML = `<li style="color:#aaa;font-size:0.81rem;padding:4px">${t('rankNoDoor')}</li>`;
    return;
  }

  list.innerHTML = ranked.map(s => {
    const color = seatColor(s.rank, s.total);
    const isKamiza  = s.rank === 1;
    const isShimoza = s.rank === s.total && s.total >= 2;
    const tag = isKamiza
      ? `<span class="rank-tag" style="background:${color}">${t('kamiza')}</span>`
      : isShimoza
      ? `<span class="rank-tag" style="background:${color}">${t('shimoza')}</span>`
      : '';
    const seatLabel = lang === 'ja' ? `${s.rank}番の席` : `Seat ${s.rank}`;
    return `
      <li class="rank-row" style="background:${color}20">
        <div class="rank-circle" style="background:${color}">${s.rank}</div>
        <span>${seatLabel}</span>
        ${tag}
      </li>`;
  }).join('');
}

// ── Share / Save ──────────────────────────────────────────────
function shareToX() {
  const text = t('shareText', seats.length);
  const url = 'https://amiza-shimoza-checker.vercel.app/';
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
}

function saveImage() {
  const link = document.createElement('a');
  link.download = lang === 'ja' ? '上座下座チェッカー.png' : 'kamiza-shimoza-checker.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── Init ──────────────────────────────────────────────────────
redraw();
updateHint();
updateRankList();
</script>
